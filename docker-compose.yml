version: "3.8"

services:
  db:
    image: postgres:15
    container_name: lms-db
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: redis-cache
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: lms-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_NAME=lms_db
      - DB_USER=lms_user
      - DB_PASSWORD=lms_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=django-insecure-some-secret-key-for-lms-project
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
